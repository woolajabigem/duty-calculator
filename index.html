<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ops Duty Command - Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none; } }
        .calendar-day { min-height: 120px; border: 1px solid #e2e8f0; transition: all 0.2s; }
        .calendar-day:hover { background-color: #f8fafc; }
        .duty-tag { font-size: 0.65rem; padding: 1px 4px; border-radius: 3px; margin-bottom: 1px; display: block; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .tag-day { background: #dcfce7; color: #166534; border-left: 3px solid #22c55e; }
        .tag-night { background: #f1f5f9; color: #334155; border-left: 3px solid #64748b; }
        .tag-shadow { background: #f3e8ff; color: #6b21a8; border-left: 3px solid #a855f7; }
        .tag-comsec { background: #ffedd5; color: #9a3412; border-left: 3px solid #f97316; }
        .tag-datahall { background: #dbeafe; color: #1e40af; border-left: 3px solid #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div class="max-w-[1600px] mx-auto p-4">
        <!-- Header -->
        <header class="flex flex-wrap justify-between items-center mb-6 bg-white p-6 rounded-2xl shadow-sm border gap-4">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-slate-800">Duty Command Center</h1>
                <p class="text-slate-500 text-sm font-medium uppercase tracking-tighter">Panama 2-2-3 Global Roster</p>
            </div>
            
            <div class="flex items-center gap-4 no-print">
                <div class="flex bg-slate-100 p-1 rounded-xl border">
                    <button onclick="changeMonth(-1)" class="p-2 hover:bg-white rounded-lg transition">◀</button>
                    <div id="currentMonthDisplay" class="px-6 py-2 font-bold text-slate-700 min-w-[150px] text-center">Month Year</div>
                    <button onclick="changeMonth(1)" class="p-2 hover:bg-white rounded-lg transition">▶</button>
                </div>
                <button onclick="window.print()" class="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold hover:shadow-lg transition active:scale-95">Print Roster</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <!-- Sidebar -->
            <div class="lg:col-span-1 space-y-6 no-print">
                <!-- Personnel -->
                <div class="bg-white p-5 rounded-2xl shadow-sm border">
                    <h2 class="text-sm font-bold text-blue-600 uppercase mb-4 tracking-widest flex justify-between">
                        Personnel Pool <span id="pCount" class="text-slate-400">0</span>
                    </h2>
                    <div class="space-y-2">
                        <input type="text" id="pName" placeholder="Name" class="w-full p-2 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                        <div class="grid grid-cols-2 gap-2">
                            <select id="pRank" class="p-2 border rounded-xl text-sm bg-slate-50">
                                <option value="SO">SO (Senior)</option>
                                <option value="JO">JO (Junior)</option>
                            </select>
                            <select id="pTeam" class="p-2 border rounded-xl text-sm bg-slate-50">
                                <option value="COU">COU</option>
                                <option value="CIU">CIU</option>
                                <option value="SOC">SOC</option>
                            </select>
                        </div>
                        <button onclick="addPerson()" class="w-full bg-blue-600 text-white py-2.5 rounded-xl font-bold hover:bg-blue-700 transition">Add Personnel</button>
                    </div>

                    <div class="mt-4 max-h-[300px] overflow-y-auto border-t pt-4">
                        <div id="personList" class="space-y-2"></div>
                    </div>
                </div>

                <!-- Daily Requirements -->
                <div class="bg-white p-5 rounded-2xl shadow-sm border">
                    <h2 class="text-sm font-bold text-purple-600 uppercase mb-4 tracking-widest">Daily Requirements</h2>
                    <div class="space-y-4 text-xs">
                        <div class="flex justify-between items-center p-2 bg-purple-50 rounded-lg">
                            <span>Shadow (SO/JO)</span>
                            <div class="flex gap-1">
                                <input type="number" id="reqShadowSO" value="1" class="w-10 p-1 border rounded text-center" oninput="renderCalendar()">
                                <input type="number" id="reqShadowJO" value="2" class="w-10 p-1 border rounded text-center" oninput="renderCalendar()">
                            </div>
                        </div>
                        <div class="flex justify-between items-center p-2 bg-orange-50 rounded-lg">
                            <span>COMSEC (SO)</span>
                            <input type="number" id="reqComsec" value="1" class="w-10 p-1 border rounded text-center" oninput="renderCalendar()">
                        </div>
                        <div class="flex justify-between items-center p-2 bg-blue-50 rounded-lg">
                            <span>Datahall (JO)</span>
                            <input type="number" id="reqDatahall" value="2" class="w-10 p-1 border rounded text-center" oninput="renderCalendar()">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Calendar Container -->
            <div class="lg:col-span-3">
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <div class="grid grid-cols-7 bg-slate-800 text-white text-[10px] uppercase font-bold text-center py-3 tracking-widest">
                        <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
                    </div>
                    <div id="calendarGrid" class="grid grid-cols-7 border-l border-t">
                        <!-- Days generated here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let people = [];
        let currentMonth = new Date(2026, 4, 1); // Start with May 2026 (Month is 0-indexed)

        // Panama Pattern: 1=Day Shift, 2=Night Shift, 0=Off
        // Groups rotate based on this 14-day cycle
        const patternA = [1, 1, 0, 0, 1, 1, 1, 0, 0, 1, 1, 0, 0, 0];
        const patternC = [2, 2, 0, 0, 2, 2, 2, 0, 0, 2, 2, 0, 0, 0];
        const patternB = [0, 0, 1, 1, 0, 0, 0, 1, 1, 0, 0, 1, 1, 1];
        const patternD = [0, 0, 2, 2, 0, 0, 0, 2, 2, 0, 0, 2, 2, 2];

        // Reference point for Panama Cycle (Monday, Jan 1, 2024)
        const refDate = new Date(2024, 0, 1);

        function addPerson() {
            const name = document.getElementById('pName').value.trim();
            if (!name) return;

            const rank = document.getElementById('pRank').value;
            const team = document.getElementById('pTeam').value;
            
            // Auto-allocate Group
            const counts = { A: 0, B: 0, C: 0, D: 0 };
            people.filter(p => p.rank === rank).forEach(p => counts[p.group]++);
            const group = Object.keys(counts).reduce((a, b) => counts[a] <= counts[b] ? a : b);

            people.push({ id: Date.now(), name, rank, team, group });
            document.getElementById('pName').value = '';
            renderPeople();
            renderCalendar();
        }

        function renderPeople() {
            const list = document.getElementById('personList');
            document.getElementById('pCount').innerText = people.length;
            list.innerHTML = people.map(p => `
                <div class="flex items-center justify-between p-2 bg-slate-50 rounded-xl text-xs border border-slate-100">
                    <div>
                        <span class="font-bold">${p.name}</span>
                        <div class="text-[9px] text-slate-400">${p.team} • ${p.rank}</div>
                    </div>
                    <div class="flex items-center gap-2">
                        <select onchange="updateGroup(${p.id}, this.value)" class="bg-white border rounded p-1 font-bold text-blue-600">
                            <option value="A" ${p.group==='A'?'selected':''}>A</option>
                            <option value="B" ${p.group==='B'?'selected':''}>B</option>
                            <option value="C" ${p.group==='C'?'selected':''}>C</option>
                            <option value="D" ${p.group==='D'?'selected':''}>D</option>
                        </select>
                        <button onclick="removePerson(${p.id})" class="text-red-400 hover:text-red-600">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function updateGroup(id, val) {
            const p = people.find(p => p.id === id);
            if (p) p.group = val;
            renderCalendar();
        }

        function removePerson(id) {
            people = people.filter(p => p.id !== id);
            renderPeople();
            renderCalendar();
        }

        function changeMonth(dir) {
            currentMonth.setMonth(currentMonth.getMonth() + dir);
            renderCalendar();
        }

        function getDutyForDay(person, date) {
            const diffTime = date.getTime() - refDate.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const cycleIdx = ((diffDays % 14) + 14) % 14;

            if (person.group === 'A') return patternA[cycleIdx];
            if (person.group === 'B') return patternB[cycleIdx];
            if (person.group === 'C') return patternC[cycleIdx];
            if (person.group === 'D') return patternD[cycleIdx];
            return 0;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const display = document.getElementById('currentMonthDisplay');
            grid.innerHTML = '';
            
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            display.innerText = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(currentMonth);

            const firstDay = (new Date(year, month, 1).getDay() + 6) % 7; // Monday start
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            // Requirements
            const sSO_r = parseInt(document.getElementById('reqShadowSO').value) || 0;
            const sJO_r = parseInt(document.getElementById('reqShadowJO').value) || 0;
            const c_r = parseInt(document.getElementById('reqComsec').value) || 0;
            const d_r = parseInt(document.getElementById('reqDatahall').value) || 0;

            // Empty slots for previous month
            for (let i = 0; i < firstDay; i++) {
                grid.innerHTML += `<div class="calendar-day bg-slate-50/50"></div>`;
            }

            // Generate Days
            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(year, month, d);
                let dayHtml = `<div class="calendar-day p-1 bg-white border-r border-b">
                    <div class="text-[10px] font-bold text-slate-300 mb-1">${d}</div>`;
                
                let dayShift = [], nightShift = [], offPool = [];

                people.forEach(p => {
                    const status = getDutyForDay(p, date);
                    if (status === 1) dayShift.push(p);
                    else if (status === 2) nightShift.push(p);
                    else offPool.push({...p});
                });

                // Display Shifts
                dayShift.forEach(p => dayHtml += `<span class="duty-tag tag-day">☀️ ${p.name}</span>`);
                nightShift.forEach(p => dayHtml += `<span class="duty-tag tag-night">🌙 ${p.name}</span>`);

                // Distribute Commitments from Off Pool
                let soOff = offPool.filter(p => p.rank === 'SO');
                let joOff = offPool.filter(p => p.rank === 'JO');

                // COMSEC (SO Only)
                for (let i = 0; i < c_r && soOff.length > 0; i++) {
                    let p = soOff.shift();
                    dayHtml += `<span class="duty-tag tag-comsec">🔑 COMSEC: ${p.name}</span>`;
                }
                // Shadow SO
                for (let i = 0; i < sSO_r && soOff.length > 0; i++) {
                    let p = soOff.shift();
                    dayHtml += `<span class="duty-tag tag-shadow">👥 SHADOW: ${p.name}</span>`;
                }
                // Shadow JO
                for (let i = 0; i < sJO_r && joOff.length > 0; i++) {
                    let p = joOff.shift();
                    dayHtml += `<span class="duty-tag tag-shadow">👥 SHADOW: ${p.name}</span>`;
                }
                // Datahall
                for (let i = 0; i < d_r && joOff.length > 0; i++) {
                    let p = joOff.shift();
                    dayHtml += `<span class="duty-tag tag-datahall">❄️ DATA: ${p.name}</span>`;
                }

                dayHtml += `</div>`;
                grid.innerHTML += dayHtml;
            }
        }

        window.onload = () => {
            renderPeople();
            renderCalendar();
        };
    </script>
</body>
</html>
