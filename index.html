<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duty Command: Calendar Roster</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .duty-cell { min-width: 120px; font-size: 0.7rem; }
        .calendar-grid { display: grid; grid-template-columns: 80px 1fr 1fr 1fr 1fr 1fr; border-top: 1px solid #e2e8f0; }
        .header-grid { display: grid; grid-template-columns: 80px 1fr 1fr 1fr 1fr 1fr; background: #1e293b; color: white; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-2 md:p-6 font-sans text-slate-800">

    <div class="max-w-[1600px] mx-auto">
        <header class="mb-6 flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border">
            <div>
                <h1 class="text-2xl font-black text-slate-900 tracking-tight">Duty Command Center</h1>
                <p class="text-slate-500 text-xs font-medium uppercase tracking-widest">Panama Cycle + Specialized Commitments</p>
            </div>
            <button onclick="window.print()" class="bg-slate-800 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-slate-700">Print Roster</button>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-6">
            
            <!-- LEFT PANEL: SETTINGS & PERSONNEL -->
            <div class="xl:col-span-1 space-y-6 no-print">
                
                <!-- 1. ADD PERSONNEL -->
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-sm font-bold mb-4 text-blue-700 uppercase tracking-wider">1. Personnel Management</h2>
                    <div class="space-y-2 mb-4">
                        <input type="text" id="pName" placeholder="Name" class="w-full p-2 text-sm border rounded-lg outline-none">
                        <div class="grid grid-cols-2 gap-2">
                            <select id="pRank" class="p-2 text-sm border rounded-lg bg-slate-50">
                                <option value="SO">SO (Senior)</option>
                                <option value="JO">JO (Junior)</option>
                            </select>
                            <select id="pGroup" class="p-2 text-sm border rounded-lg bg-slate-50">
                                <option value="A">Group A</option>
                                <option value="B">Group B</option>
                                <option value="C">Group C</option>
                                <option value="D">Group D</option>
                            </select>
                        </div>
                        <select id="pTeam" class="w-full p-2 text-sm border rounded-lg bg-slate-50">
                            <option value="COU">COU</option>
                            <option value="CIU">CIU</option>
                            <option value="SOC">SOC</option>
                        </select>
                        <button onclick="addPerson()" class="w-full bg-blue-600 text-white py-2 rounded-lg text-sm font-bold hover:bg-blue-700">Add to Pool</button>
                    </div>
                    
                    <div class="max-h-60 overflow-y-auto border rounded-lg text-[10px]">
                        <table class="w-full text-left">
                            <thead class="bg-slate-100"><tr><th class="p-2">Name</th><th class="p-2">Grp</th><th class="p-2">Rank</th><th class="p-2"></th></tr></thead>
                            <tbody id="pTable"></tbody>
                        </table>
                    </div>
                </div>

                <!-- 2. COMMITMENT REQUIREMENTS -->
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-sm font-bold mb-4 text-purple-700 uppercase tracking-wider">2. Commitments (Per Day)</h2>
                    <div class="space-y-4">
                        <div class="p-3 bg-purple-50 rounded-lg">
                            <p class="text-[10px] font-bold text-purple-800 uppercase mb-2">CNOC Shadow</p>
                            <div class="grid grid-cols-2 gap-2">
                                <input type="number" id="sSO" placeholder="SO" value="1" class="p-1 text-xs border rounded w-full">
                                <input type="number" id="sJO" placeholder="JO" value="1" class="p-1 text-xs border rounded w-full">
                            </div>
                        </div>
                        <div class="p-3 bg-orange-50 rounded-lg">
                            <p class="text-[10px] font-bold text-orange-800 uppercase mb-2">COMSEC (SO)</p>
                            <input type="number" id="cSO" value="1" class="p-1 text-xs border rounded w-full">
                        </div>
                        <div class="p-3 bg-blue-50 rounded-lg">
                            <p class="text-[10px] font-bold text-blue-800 uppercase mb-2">Datahall (JO)</p>
                            <input type="number" id="dJO" value="1" class="p-1 text-xs border rounded w-full">
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT PANEL: THE CALENDAR ROSTER -->
            <div class="xl:col-span-3 space-y-6">
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="header-grid p-3">
                        <div>Date</div>
                        <div>Day Shift (24/7)</div>
                        <div>Night Shift (24/7)</div>
                        <div>CNOC Shadow</div>
                        <div>COMSEC</div>
                        <div>Datahall</div>
                    </div>
                    <div id="calendarBody" class="divide-y divide-slate-100 h-[80vh] overflow-y-auto">
                        <!-- Calendar rows injected here -->
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let people = [];
        // Panama 14-day pattern for Group A (1=Work, 0=Off)
        // Groups B, C, D are shifted versions of this
        const panamaPattern = [1, 1, 0, 0, 1, 1, 1, 0, 0, 1, 1, 0, 0, 0];

        function addPerson() {
            const name = document.getElementById('pName').value.trim();
            if(!name) return;
            people.push({
                id: Date.now(),
                name,
                rank: document.getElementById('pRank').value,
                group: document.getElementById('pGroup').value,
                team: document.getElementById('pTeam').value
            });
            document.getElementById('pName').value = '';
            renderPersonnel();
            generateRoster();
        }

        function removePerson(id) {
            people = people.filter(p => p.id !== id);
            renderPersonnel();
            generateRoster();
        }

        function renderPersonnel() {
            const t = document.getElementById('pTable');
            t.innerHTML = people.map(p => `
                <tr class="border-b">
                    <td class="p-2">${p.name}</td>
                    <td class="p-2 font-bold">${p.group}</td>
                    <td class="p-2 text-blue-600">${p.rank}</td>
                    <td class="p-2 text-right"><button onclick="removePerson(${p.id})" class="text-red-400 font-bold">×</button></td>
                </tr>
            `).join('');
        }

        function getShiftStatus(group, dayIndex) {
            // DayIndex 0-29
            // Panama Groups logic (Simple 4-team rotation)
            const patternIdx = dayIndex % 14;
            // Simplified Logic for 2-2-3 rotation mapping
            if (group === 'A') return panamaPattern[patternIdx] ? 'DAY' : 'OFF';
            if (group === 'B') return panamaPattern[patternIdx] ? 'NIGHT' : 'OFF';
            if (group === 'C') return panamaPattern[(patternIdx + 7) % 14] ? 'DAY' : 'OFF';
            if (group === 'D') return panamaPattern[(patternIdx + 7) % 14] ? 'NIGHT' : 'OFF';
            return 'OFF';
        }

        function generateRoster() {
            const body = document.getElementById('calendarBody');
            body.innerHTML = '';
            
            const sSO_req = parseInt(document.getElementById('sSO').value) || 0;
            const sJO_req = parseInt(document.getElementById('sJO').value) || 0;
            const cSO_req = parseInt(document.getElementById('cSO').value) || 0;
            const dJO_req = parseInt(document.getElementById('dJO').value) || 0;

            for (let d = 1; d <= 30; d++) {
                const dayIdx = d - 1;
                let dayShift = [], nightShift = [], shadow = [], comsec = [], datahall = [];
                
                // 1. Assign 24/7 Shifts based on Panama Pattern
                people.forEach(p => {
                    const status = getShiftStatus(p.group, dayIdx);
                    if (status === 'DAY') dayShift.push(p);
                    else if (status === 'NIGHT') nightShift.push(p);
                });

                // 2. Assign specialized commitments from the "OFF" pool
                // To keep it simple for a roster, we pick people who are "OFF" shift that day
                const offPool = people.filter(p => getShiftStatus(p.group, dayIdx) === 'OFF');
                
                let soOff = offPool.filter(p => p.rank === 'SO');
                let joOff = offPool.filter(p => p.rank === 'JO');

                // Fill COMSEC (SO Only)
                for(let i=0; i<cSO_req && soOff.length > 0; i++) comsec.push(soOff.shift());
                
                // Fill Shadow (SO then JO)
                for(let i=0; i<sSO_req && soOff.length > 0; i++) shadow.push(soOff.shift());
                for(let i=0; i<sJO_req && joOff.length > 0; i++) shadow.push(joOff.shift());
                
                // Fill Datahall (JO Only)
                for(let i=0; i<dJO_req && joOff.length > 0; i++) datahall.push(joOff.shift());

                // Build Row HTML
                body.innerHTML += `
                    <div class="calendar-grid p-2 hover:bg-slate-50 transition">
                        <div class="text-xs font-bold text-slate-400">Day ${d}</div>
                        <div class="duty-cell">${dayShift.map(p => `<div>• ${p.name} <span class="text-[8px] text-slate-400">(${p.team})</span></div>`).join('')}</div>
                        <div class="duty-cell">${nightShift.map(p => `<div>• ${p.name} <span class="text-[8px] text-slate-400">(${p.team})</span></div>`).join('')}</div>
                        <div class="duty-cell text-purple-600">${shadow.map(p => `<div>• ${p.name}</div>`).join('')}</div>
                        <div class="duty-cell text-orange-600">${comsec.map(p => `<div>• ${p.name}</div>`).join('')}</div>
                        <div class="duty-cell text-blue-600">${datahall.map(p => `<div>• ${p.name}</div>`).join('')}</div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
